workflows:
  ios-build:
    name: PPPIX iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar .xcodeproj
        script: xcodegen generate --spec project.yml

      - name: Resolver pacotes SPM
        script: |
          xcodebuild -project PPPIX.xcodeproj \
            -scheme PPPIX \
            -resolvePackageDependencies

      - name: Build para device (sem assinar)
        script: |
          xcodebuild \
            -project PPPIX.xcodeproj \
            -scheme PPPIX \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO

    artifacts:
      - ~/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    publishing:
      email:
        recipients:
          - pixpppapp@gmail.com
        notify:
          success: true
          failure: true
