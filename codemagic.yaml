workflows:
  ios-build:
    name: PPPIX iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: 16.2
      cocoapods: default

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar .xcodeproj
        script: xcodegen generate --spec project.yml

      - name: Resolver pacotes SPM
        script: |
          xcodebuild -project PPPIX.xcodeproj \
            -scheme PPPIX \
            -resolvePackageDependencies

      - name: Build simulador
        script: |
          xcodebuild \
            -project PPPIX.xcodeproj \
            -scheme PPPIX \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            -derivedDataPath build \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Zipar .app
        script: |
          APP=$(find build -name "*.app" | head -1)
          echo "App encontrado: $APP"
          zip -r PPPIX_simulator.zip "$APP"

    artifacts:
      - PPPIX_simulator.zip

    publishing:
      email:
        recipients:
          - pixpppapp@gmail.com
        notify:
          success: true
          failure: true
