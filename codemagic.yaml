workflows:
  ios-testflight:
    name: PPPIX iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: Codemagic

    environment:
      xcode: 16.2
      cocoapods: default
      groups:
        - PPPIX
      ios_signing:
        distribution_type: app_store
        bundle_identifier: tech.pppix.app
      vars:
        BUNDLE_ID: "tech.pppix.app"
        XCODE_SCHEME: "PPPIX"
        XCODE_PROJECT: "PPPIX.xcodeproj"

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar .xcodeproj
        script: xcodegen generate --spec project.yml

      - name: Atualizar Team ID
        script: |
          sed -i '' 's/DEVELOPMENT_TEAM = ""/DEVELOPMENT_TEAM = K5SWZ92Z64/g' PPPIX.xcodeproj/project.pbxproj || true
          sed -i '' 's/DEVELOPMENT_TEAM = ;/DEVELOPMENT_TEAM = K5SWZ92Z64;/g' PPPIX.xcodeproj/project.pbxproj || true

      - name: Resolver pacotes SPM
        script: |
          xcodebuild -project PPPIX.xcodeproj \
            -scheme PPPIX \
            -resolvePackageDependencies

      - name: Build e Archive
        script: |
          xcodebuild \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -archivePath build/PPPIX.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=K5SWZ92Z64 \
            archive \
            -allowProvisioningUpdates

      - name: Exportar IPA
        script: |
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>K5SWZ92Z64</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/PPPIX.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - pixpppapp@gmail.com
        notify:
          success: true
          failure: true
