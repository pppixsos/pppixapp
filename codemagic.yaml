workflows:
  ios-testflight:
    name: PPPIX iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: 16.2
      cocoapods: default
      groups:
        - PPPIX
      vars:
        BUNDLE_ID: "tech.pppix.app"
        XCODE_SCHEME: "PPPIX"
        XCODE_PROJECT: "PPPIX.xcodeproj"
        TEAM_ID: "K5SWZ92Z64"

    scripts:
      - name: Instalar XcodeGen
        script: brew install xcodegen

      - name: Gerar .xcodeproj
        script: xcodegen generate --spec project.yml

      - name: Atualizar Team ID
        script: |
          sed -i '' "s/DEVELOPMENT_TEAM = \"\"/DEVELOPMENT_TEAM = $TEAM_ID/g" PPPIX.xcodeproj/project.pbxproj || true
          sed -i '' "s/DEVELOPMENT_TEAM = ;/DEVELOPMENT_TEAM = $TEAM_ID;/g" PPPIX.xcodeproj/project.pbxproj || true

      - name: Configurar API Key para assinatura
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8

      - name: Resolver pacotes SPM
        script: |
          xcodebuild -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -resolvePackageDependencies

      - name: Build e Archive
        script: |
          xcodebuild \
            -project $XCODE_PROJECT \
            -scheme $XCODE_SCHEME \
            -configuration Release \
            -archivePath build/PPPIX.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$TEAM_ID \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_IDENTIFIER \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID

      - name: Exportar IPA
        script: |
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>K5SWZ92Z64</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/PPPIX.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8 \
            -authenticationKeyID $APP_STORE_CONNECT_KEY_IDENTIFIER \
            -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - pixpppapp@gmail.com
        notify:
          success: true
          failure: true
