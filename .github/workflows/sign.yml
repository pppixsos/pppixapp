name: Sign and Upload PPPIX to TestFlight

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if [ -d "/Applications/Xcode_26.0.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.1.app
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi
          xcodebuild -version

      - name: Install tools
        run: |
          brew install xcodegen
          gem install xcpretty || true
          pip3 install PyJWT cryptography --break-system-packages

      - name: Setup App Store Connect API Key
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Setup keychain and import certificate
        env:
          CERT_ID_SECRET: ${{ secrets.CERT_ID }}
        run: |
          # Gerar chave privada
          openssl genrsa -out /tmp/mac_key.key 2048
          echo "CERT_ID=$CERT_ID_SECRET" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$HOME/Library/Keychains/login.keychain-db" >> $GITHUB_ENV
          echo "Chave gerada"

      - name: Create certificate via API
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          pip3 install PyJWT --break-system-packages -q
          echo "" | base64 --decode > /tmp/gen_cert.py
          python3 /tmp/gen_cert.py
          echo "CERT_ID=$(cat /tmp/cert_id.txt)" >> $GITHUB_ENV

      - name: Import certificate into login keychain
        run: |
          # Converter cert para PEM
          if openssl x509 -inform DER -in /tmp/new_cert.cer -out /tmp/new_cert.pem 2>/dev/null; then
            echo "DER->PEM OK"
          else
            cp /tmp/new_cert.cer /tmp/new_cert.pem && echo "ja era PEM"
          fi
          # Criar p12 com apenas o cert + chave (sem cadeia intermediaria)
          openssl pkcs12 -export -out /tmp/pppix.p12 -inkey /tmp/mac_key.key -in /tmp/new_cert.pem -passout pass:pppix123
          # Importar no LOGIN keychain — nao criar keychain custom
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
          security import /tmp/pppix.p12 -k ~/Library/Keychains/login.keychain-db -P pppix123 -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" ~/Library/Keychains/login.keychain-db 2>/dev/null ||           security set-key-partition-list -S apple-tool:,apple:,codesign: -s ~/Library/Keychains/login.keychain-db 2>/dev/null || true
          echo '=== Identidades ==='
          security find-identity -v -p codesigning
          CERT_IDENTITY=$(security find-identity -v -p codesigning | grep -E 'Apple Distribution|iPhone Distribution' | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ -z "$CERT_IDENTITY" ]; then echo 'ERRO: sem certificado valido'; exit 1; fi
          echo "CERT_IDENTITY=$CERT_IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$HOME/Library/Keychains/login.keychain-db" >> $GITHUB_ENV
          echo "Usando: $CERT_IDENTITY"

      - name: Create and install provisioning profile
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          echo "" | base64 --decode > /tmp/gen_profile.py
          python3 /tmp/gen_profile.py
          echo "PROFILE_UUID=$(cat /tmp/profile_uuid.txt)" >> $GITHUB_ENV

      - name: Generate .xcodeproj with correct signing
        run: |
          echo "" | base64 --decode > /tmp/update_signing.py
          python3 /tmp/update_signing.py

      - name: Resolve SPM
        run: xcodebuild -project PPPIX.xcodeproj -scheme PPPIX-Full -resolvePackageDependencies -clonedSourcePackagesDirPath $RUNNER_TEMP/spm

      - name: Archive
        run: |
          security find-identity -v -p codesigning | head -5
          # Salva o log completo em arquivo E mostra na tela ao mesmo tempo
          xcodebuild \
            -project PPPIX.xcodeproj \
            -scheme PPPIX-Full \
            -configuration Release \
            -archivePath $RUNNER_TEMP/PPPIX.xcarchive \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath $RUNNER_TEMP/spm \
            CODE_SIGN_IDENTITY="$CERT_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive 2>&1 | tee /tmp/xcodebuild.log; BUILD_EXIT=${PIPESTATUS[0]}
          # Extrai e mostra APENAS os erros Swift reais
          echo "=== ERROS SWIFT ==="
          grep -E "error:|swift:|\.swift:[0-9]" /tmp/xcodebuild.log | grep -v "^$" | head -50
          echo "=== FIM ERROS ==="
          exit $BUILD_EXIT

      - name: Export IPA
        run: |
          security unlock-keychain -p temppass123 build.keychain
          echo "" | base64 --decode > /tmp/mk_plist.py
          python3 /tmp/mk_plist.py
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/PPPIX.xcarchive \
            -exportPath $RUNNER_TEMP/PPPIX_ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Check signature
        run: |
          unzip -o $RUNNER_TEMP/PPPIX_ipa/PPPIX.ipa -d /tmp/ipa_check > /dev/null 2>&1
          echo '=== Verificando assinatura ==='
          codesign -dv --verbose=4 /tmp/ipa_check/Payload/PPPIX.app 2>&1 | grep -E 'Authority|TeamID|Identifier'
          echo '=== Authority NAO deve ser unavailable ==='

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/PPPIX_ipa/PPPIX.ipa \
            --type ios \
            --apiKey ${KEY_ID} \
            --apiIssuer ${ISSUER_ID} \
            --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 \
            --verbose 2>&1

      - name: Upload IPA como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PPPIX-IPA
          path: ${{ runner.temp }}/PPPIX_ipa/PPPIX.ipa
