name: Sign and Install PPPIX

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate --spec project.yml

      - name: Install certificate and provisioning profile
        env:
          DIST_CERT: ${{ secrets.DISTRIBUTION_CERT_BASE64 }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY_BASE64 }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Decodificar arquivos
          echo "$DIST_CERT" | base64 --decode > /tmp/distribution.cer
          echo "$PRIVATE_KEY" | base64 --decode > /tmp/pppix.key
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/pppix.mobileprovision

          # Criar p12
          openssl x509 -inform DER -in /tmp/distribution.cer -out /tmp/distribution.pem
          openssl pkcs12 -export -out /tmp/pppix.p12 \
            -inkey /tmp/pppix.key \
            -in /tmp/distribution.pem \
            -passout pass:pppix123

          # Criar keychain e importar certificado
          security create-keychain -p temppass123 build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s build.keychain
          security unlock-keychain -p temppass123 build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/pppix.p12 -k build.keychain -P pppix123 -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temppass123 build.keychain
          security find-identity -v -p codesigning build.keychain

          # Instalar perfil de provisionamento
          UUID=$(python3 -c "
          import plistlib, subprocess
          out = subprocess.check_output(['security', 'cms', '-D', '-i', '/tmp/pppix.mobileprovision'])
          plist = plistlib.loads(out)
          print(plist['UUID'])
          ")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp /tmp/pppix.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "Profile UUID: $UUID"
          ls ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Setup API Key
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          echo "API key installed"

      - name: Resolve SPM
        run: xcodebuild -project PPPIX.xcodeproj -scheme PPPIX -resolvePackageDependencies

      - name: Archive with Apple Distribution
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Verificar identidade disponível
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Apple Distribution" | head -1 | awk '{print $2}')
          echo "Using identity: $IDENTITY"

          xcodebuild \
            -project PPPIX.xcodeproj \
            -scheme PPPIX \
            -configuration Release \
            -archivePath $RUNNER_TEMP/PPPIX.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution: Carlos Roberto Junqueira (K5SWZ92Z64)" \
            DEVELOPMENT_TEAM=K5SWZ92Z64 \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            PROVISIONING_PROFILE_SPECIFIER="PPPIX AppStore" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            archive 2>&1 | grep -v "^note:"

      - name: Export IPA
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>K5SWZ92Z64</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>tech.pppix.app</key>
              <string>PPPIX AppStore</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/PPPIX.xcarchive \
            -exportPath $RUNNER_TEMP/PPPIX_ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID ${KEY_ID} \
            -authenticationKeyIssuerID ${ISSUER_ID}

          ls $RUNNER_TEMP/PPPIX_ipa/

      - name: Verify IPA signature
        run: |
          codesign -dv --verbose=4 $RUNNER_TEMP/PPPIX_ipa/PPPIX.ipa 2>&1 || true
          unzip -o $RUNNER_TEMP/PPPIX_ipa/PPPIX.ipa -d /tmp/ipa_contents > /dev/null 2>&1
          codesign -dv --verbose=4 /tmp/ipa_contents/Payload/PPPIX.app 2>&1 | grep -E "Authority|TeamID|Identifier"

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/PPPIX_ipa/PPPIX.ipa \
            --type ios \
            --apiKey ${KEY_ID} \
            --apiIssuer ${ISSUER_ID} \
            --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 2>&1

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PPPIX-IPA
          path: ${{ runner.temp }}/PPPIX_ipa/PPPIX.ipa
