name: Sign and Upload PPPIX to TestFlight

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if [ -d "/Applications/Xcode_26.0.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.1.app
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi
          xcodebuild -version

      - name: Install tools
        run: |
          brew install xcodegen
          pip3 install PyJWT --break-system-packages -q

      - name: Setup App Store Connect API Key
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Create distribution certificate
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          echo "" | base64 --decode > /tmp/gen_cert.py
          python3 /tmp/gen_cert.py
          echo "CERT_ID=$(cat /tmp/cert_id.txt)" >> $GITHUB_ENV

      - name: Import certificate into keychain
        run: |
          # Converter cert DER para PEM
          if openssl x509 -inform DER -in /tmp/new_cert.cer -out /tmp/new_cert.pem 2>/dev/null; then
            echo "DER->PEM OK"
          else
            cp /tmp/new_cert.cer /tmp/new_cert.pem
            echo "ja era PEM"
          fi
          # Criar p12
          openssl pkcs12 -export -out /tmp/pppix.p12 -inkey /tmp/mac_key.key -in /tmp/new_cert.pem -passout pass:pppix123
          # Criar keychain dedicado
          security create-keychain -p pppix123 pppix.keychain
          security set-keychain-settings -t 7200 -u pppix.keychain
          security list-keychains -d user -s pppix.keychain $(security list-keychains -d user | tr -d '"')
          security unlock-keychain -p pppix123 pppix.keychain
          # Importar cert no keychain
          security import /tmp/pppix.p12 -k pppix.keychain -P pppix123 -T /usr/bin/codesign -T /usr/bin/security -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k pppix123 pppix.keychain
          echo "=== Identidades ==="
          security find-identity -v -p codesigning pppix.keychain
          CERT_IDENTITY=$(security find-identity -v -p codesigning pppix.keychain | grep -E 'Apple Distribution|iPhone Distribution' | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ -z "$CERT_IDENTITY" ]; then
            echo "ERRO: sem certificado no keychain"
            exit 1
          fi
          KEYCHAIN_PATH=$(security list-keychains -d user | grep pppix | tr -d '" ')
          echo "CERT_IDENTITY=$CERT_IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "Usando: $CERT_IDENTITY"

      - name: Create provisioning profiles
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          CERT_ID: ${{ env.CERT_ID }}
        run: |
          echo "" | base64 --decode > /tmp/gen_profile.py
          python3 /tmp/gen_profile.py
          echo "PROFILE_UUID=$(cat /tmp/profile_uuid.txt)" >> $GITHUB_ENV

      - name: Generate xcodeproj with signing
        run: |
          echo "" | base64 --decode > /tmp/update_signing.py
          python3 /tmp/update_signing.py

      - name: Resolve SPM
        run: xcodebuild -project PPPIX.xcodeproj -scheme PPPIX-Full -resolvePackageDependencies -clonedSourcePackagesDirPath $RUNNER_TEMP/spm

      - name: Archive
        run: |
          security unlock-keychain -p pppix123 pppix.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k pppix123 pppix.keychain
          xcodebuild \
            -project PPPIX.xcodeproj \
            -scheme PPPIX-Full \
            -configuration Release \
            -archivePath $RUNNER_TEMP/PPPIX.xcarchive \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath $RUNNER_TEMP/spm \
            CODE_SIGN_IDENTITY="$CERT_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive 2>&1 | tee /tmp/xcodebuild.log; BUILD_EXIT=${PIPESTATUS[0]}
          grep -E "error:|\.swift:[0-9]" /tmp/xcodebuild.log | grep -v "^$" | head -30
          exit $BUILD_EXIT

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>K5SWZ92Z64</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>iPhone Distribution</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/PPPIX.xcarchive \
            -exportPath $RUNNER_TEMP/PPPIX_ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/PPPIX_ipa/PPPIX.ipa \
            --type ios \
            --apiKey ${KEY_ID} \
            --apiIssuer ${ISSUER_ID} \
            --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Upload IPA como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PPPIX-IPA
          path: ${{ runner.temp }}/PPPIX_ipa/PPPIX.ipa
