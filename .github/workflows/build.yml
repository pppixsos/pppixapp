name: Sign and Install PPPIX

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate --spec project.yml

      - name: Generate certificate via API
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          pip3 install PyJWT cryptography --break-system-packages

          python3 << 'PYEOF'
          import jwt, time, json, urllib.request, urllib.error, os, base64, subprocess

          key_id = os.environ['KEY_ID']
          issuer_id = os.environ['ISSUER_ID']
          api_key_b64 = os.environ['API_KEY']
          private_key = base64.b64decode(api_key_b64).decode('utf-8')

          # Gerar chave privada RSA 2048
          subprocess.run(['openssl', 'genrsa', '-out', '/tmp/mac_key.key', '2048'], check=True)

          # Gerar CSR com configuração correta para Apple
          csr_config = """[req]
          default_bits = 2048
          prompt = no
          default_md = sha256
          distinguished_name = dn
          [dn]
          CN = iPhone Distribution
          O = Carlos Roberto Junqueira
          C = BR
          emailAddress = pixpppapp@gmail.com
          """
          with open('/tmp/csr.conf', 'w') as f:
              f.write(csr_config)

          subprocess.run([
              'openssl', 'req', '-new',
              '-key', '/tmp/mac_key.key',
              '-out', '/tmp/mac_csr.csr',
              '-config', '/tmp/csr.conf'
          ], check=True)

          # Ler CSR e converter para base64 sem headers
          with open('/tmp/mac_csr.csr', 'r') as f:
              csr_pem = f.read()

          # Remover headers PEM e newlines
          csr_lines = [l for l in csr_pem.split('\n') if l and not l.startswith('-----')]
          csr_b64 = ''.join(csr_lines)

          print(f"CSR length: {len(csr_b64)}")

          # Gerar token JWT
          payload = {
              'iss': issuer_id,
              'iat': int(time.time()),
              'exp': int(time.time()) + 1200,
              'aud': 'appstoreconnect-v1'
          }
          token = jwt.encode(payload, private_key, algorithm='ES256', headers={'kid': key_id})
          headers = {
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json'
          }

          # Criar certificado via API
          body = json.dumps({
              'data': {
                  'type': 'certificates',
                  'attributes': {
                      'certificateType': 'IOS_DISTRIBUTION',
                      'csrContent': csr_b64
                  }
              }
          }).encode()

          req = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/certificates',
              data=body,
              headers=headers,
              method='POST'
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.loads(resp.read())
              cert_content = data['data']['attributes']['certificateContent']
              cert_bytes = base64.b64decode(cert_content)
              with open('/tmp/new_cert.cer', 'wb') as f:
                  f.write(cert_bytes)
              with open('/tmp/cert_id.txt', 'w') as f:
                  f.write(data['data']['id'])
              print(f"Certificate created! ID: {data['data']['id']}")
          except urllib.error.HTTPError as e:
              error_body = e.read().decode()
              print(f"Error {e.code}: {error_body}")
              exit(1)
          PYEOF

          # Converter certificado para PEM
          openssl x509 -inform DER -in /tmp/new_cert.cer -out /tmp/new_cert.pem
          echo "Certificate info:"
          openssl x509 -in /tmp/new_cert.pem -noout -subject -issuer

          # Baixar WWDR G3
          curl -s https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o /tmp/AppleWWDRCAG3.cer
          openssl x509 -inform DER -in /tmp/AppleWWDRCAG3.cer -out /tmp/AppleWWDRCAG3.pem

          # Criar p12
          openssl pkcs12 -export \
            -out /tmp/pppix.p12 \
            -inkey /tmp/mac_key.key \
            -in /tmp/new_cert.pem \
            -certfile /tmp/AppleWWDRCAG3.pem \
            -passout pass:pppix123

          # Criar keychain
          security create-keychain -p temppass123 build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s build.keychain
          security unlock-keychain -p temppass123 build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/pppix.p12 -k build.keychain -P pppix123 \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temppass123 build.keychain

          echo "Identidades codesigning:"
          security find-identity -v -p codesigning build.keychain

          # Instalar perfil
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/pppix.mobileprovision
          UUID=$(python3 -c "
          import plistlib, subprocess
          out = subprocess.check_output(['security', 'cms', '-D', '-i', '/tmp/pppix.mobileprovision'])
          plist = plistlib.loads(out)
          print(plist['UUID'])
          ")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp /tmp/pppix.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "Profile UUID: $UUID"
          echo "KEYCHAIN_PATH=$HOME/Library/Keychains/build.keychain-db" >> $GITHUB_ENV

      - name: Setup API Key
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8

      - name: Resolve SPM
        run: xcodebuild -project PPPIX.xcodeproj -scheme PPPIX -resolvePackageDependencies

      - name: Archive
        run: |
          security unlock-keychain -p temppass123 build.keychain
          xcodebuild \
            -project PPPIX.xcodeproj \
            -scheme PPPIX \
            -configuration Release \
            -archivePath $RUNNER_TEMP/PPPIX.xcarchive \
            -destination "generic/platform=iOS" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Export IPA
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          security unlock-keychain -p temppass123 build.keychain
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>K5SWZ92Z64</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>tech.pppix.app</key>
              <string>PPPIX AppStore</string>
            </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/PPPIX.xcarchive \
            -exportPath $RUNNER_TEMP/PPPIX_ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Verificar assinatura
        run: |
          unzip -o $RUNNER_TEMP/PPPIX_ipa/PPPIX.ipa -d /tmp/ipa_check > /dev/null 2>&1
          codesign -dv --verbose=4 /tmp/ipa_check/Payload/PPPIX.app 2>&1 | grep -E "Authority|TeamID|Identifier"

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/PPPIX_ipa/PPPIX.ipa \
            --type ios \
            --apiKey ${KEY_ID} \
            --apiIssuer ${ISSUER_ID} \
            --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 2>&1

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PPPIX-IPA
          path: ${{ runner.temp }}/PPPIX_ipa/PPPIX.ipa
