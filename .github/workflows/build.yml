name: Sign and Install PPPIX

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate .xcodeproj
        run: xcodegen generate --spec project.yml

      - name: Install certificate
        env:
          DIST_CERT: ${{ secrets.DISTRIBUTION_CERT_BASE64 }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY_BASE64 }}
        run: |
          echo "$DIST_CERT" | base64 --decode > /tmp/distribution.cer
          echo "$PRIVATE_KEY" | base64 --decode > /tmp/pppix.key
          openssl x509 -inform DER -in /tmp/distribution.cer -out /tmp/distribution.pem
          openssl pkcs12 -export -out /tmp/pppix.p12 -inkey /tmp/pppix.key -in /tmp/distribution.pem -passout pass:pppix123
          security create-keychain -p temppass123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temppass123 build.keychain
          security import /tmp/pppix.p12 -k build.keychain -P pppix123 -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k temppass123 build.keychain
          security find-identity -v -p codesigning

      - name: Setup API Key and fetch provisioning profile
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8
          # Fetch provisioning profile via API
          python3 << PYEOF
          import jwt, time, json, urllib.request, os, base64
          key_id = os.environ['KEY_ID']
          issuer_id = os.environ['ISSUER_ID']
          with open(os.path.expanduser(f'~/.appstoreconnect/private_keys/AuthKey_{key_id}.p8')) as f:
              private_key = f.read()
          payload = {
              'iss': issuer_id,
              'iat': int(time.time()),
              'exp': int(time.time()) + 1200,
              'aud': 'appstoreconnect-v1'
          }
          token = jwt.encode(payload, private_key, algorithm='ES256', headers={'kid': key_id})
          headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          # List existing profiles
          req = urllib.request.Request('https://api.appstoreconnect.apple.com/v1/profiles?filter[profileType]=IOS_APP_STORE&filter[name]=PPPIX', headers=headers)
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
          profiles = data.get('data', [])
          if profiles:
              profile_data = profiles[0]['attributes']['profileContent']
              with open('/tmp/pppix.mobileprovision', 'wb') as f:
                  f.write(base64.b64decode(profile_data))
              print('Profile downloaded!')
          else:
              print('No profile found, will create via xcodebuild')
          PYEOF

      - name: Install provisioning profile
        run: |
          if [ -f /tmp/pppix.mobileprovision ]; then
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
            UUID=$(python3 -c "
          import plistlib, subprocess, re
          out = subprocess.check_output(['security', 'cms', '-D', '-i', '/tmp/pppix.mobileprovision'])
          plist = plistlib.loads(out)
          print(plist['UUID'])
          ")
            cp /tmp/pppix.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
            echo "Profile installed: $UUID"
          else
            echo "No profile to install"
          fi

      - name: Resolve SPM
        run: xcodebuild -project PPPIX.xcodeproj -scheme PPPIX -resolvePackageDependencies

      - name: Archive
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcodebuild \
            -project PPPIX.xcodeproj \
            -scheme PPPIX \
            -configuration Release \
            -archivePath $RUNNER_TEMP/PPPIX.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=K5SWZ92Z64 \
            OTHER_CODE_SIGN_FLAGS="--keychain /Users/runner/Library/Keychains/build.keychain-db" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID ${KEY_ID} \
            -authenticationKeyIssuerID ${ISSUER_ID} \
            archive

      - name: Export IPA
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>K5SWZ92Z64</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/PPPIX.xcarchive \
            -exportPath $RUNNER_TEMP/PPPIX_ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 \
            -authenticationKeyID ${KEY_ID} \
            -authenticationKeyIssuerID ${ISSUER_ID}

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/PPPIX_ipa/PPPIX.ipa \
            --type ios \
            --apiKey ${KEY_ID} \
            --apiIssuer ${ISSUER_ID} \
            --private-key-path ~/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8 2>&1

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PPPIX-IPA
          path: ${{ runner.temp }}/PPPIX_ipa/PPPIX.ipa
